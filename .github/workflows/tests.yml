name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run linting
        run: uv run ruff check video_compressor tests

      - name: Run type checking
        run: uv run pyright video_compressor

      - name: Run tests
        run: uv run pytest tests -v --tb=short
