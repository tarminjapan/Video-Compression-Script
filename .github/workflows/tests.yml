name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run linting
        run: uv run ruff check backend tests

      - name: Run formatting check
        run: uv run ruff format --check backend tests

      - name: Run type checking
        run: uv run pyright --warnings

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend lint (warnings fail)
        run: npm --prefix frontend run lint:strict

      - name: Run frontend format check
        run: npm --prefix frontend run format:check

      - name: Run tests
        run: uv run pytest tests -v --tb=short
