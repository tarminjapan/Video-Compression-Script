name: Build Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build executable (directory mode)
        run: uv run python scripts/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmeCompression-windows
          path: dist/AmeCompression/
          retention-days: 30

  build-onefile:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build executable (single file)
        run: uv run python scripts/build.py --onefile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmeCompression-onefile
          path: dist/AmeCompression.exe
          retention-days: 30
