name: Build Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run backend linting
        run: uv run ruff check backend tests

      - name: Run backend formatting check
        run: uv run ruff format --check backend tests

      - name: Run backend type checking (warnings fail)
        run: uv run pyright --warnings

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend lint (warnings fail)
        run: npm --prefix frontend run lint:strict

      - name: Run frontend format check
        run: npm --prefix frontend run format:check

      - name: Build executable (directory mode)
        run: uv run python scripts/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmeCompression-windows
          path: dist/AmeCompression/
          retention-days: 30

  build-onefile:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run backend linting
        run: uv run ruff check backend tests

      - name: Run backend formatting check
        run: uv run ruff format --check backend tests

      - name: Run backend type checking (warnings fail)
        run: uv run pyright --warnings

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend lint (warnings fail)
        run: npm --prefix frontend run lint:strict

      - name: Run frontend format check
        run: npm --prefix frontend run format:check

      - name: Build executable (single file)
        run: uv run python scripts/build.py --onefile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmeCompression-onefile
          path: dist/AmeCompression.exe
          retention-days: 30
