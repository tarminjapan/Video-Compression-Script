# =============================================================================
# Pre-commit Hooks for AmeCompression
# =============================================================================
# インストール: pre-commit install
# 手動実行: pre-commit run --all-files
# =============================================================================

repos:
  # Ruff - フォーマッター & リンター (Python)
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true

  # Pyright - 静的型チェック (Python)
  - repo: local
    hooks:
      - id: pyright
        name: pyright (static type checker)
        entry: pyright
        language: python
        additional_dependencies:
          - pyright==1.1.409
          - flask>=3.0.0
          - flask-cors>=4.0.0
          - requests>=2.33.1
          - pytest>=8.0.0
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest tests
        language: system
        pass_filenames: false
        always_run: true

  # Frontend Checks (ESLint & Prettier)
  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend-eslint
        entry: npx --prefix frontend eslint --fix
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
      - id: frontend-prettier
        name: frontend-prettier
        entry: npx --prefix frontend prettier --write
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|css|scss|html|json)$
        pass_filenames: false

  # 基本的なチェック (行末空白、YAML等)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: forbid-new-submodules
      - id: mixed-line-ending
        args: [--fix=lf]

  # スペルチェック
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [--write-changes]
        exclude: ^(frontend/package-lock\.json|uv\.lock)
