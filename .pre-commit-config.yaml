# =============================================================================
# Pre-commit Hooks for AmeCompression
# =============================================================================
# インストール: pre-commit install
# 手動実行: pre-commit run --all-files
# =============================================================================

repos:
  # エラー抑制コメントの禁止
  - repo: local
    hooks:
      - id: prohibit-suppression-comments
        name: prohibit suppression comments
        entry: python scripts/check_suppression_comments.py
        language: system
        pass_filenames: true

  # Ruff - フォーマッター & リンター (Python)
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format --check
        language: system
        types: [python]
        require_serial: true

  # Pyright - 静的型チェック (Python)
  - repo: local
    hooks:
      - id: pyright
        name: pyright (static type checker)
        entry: uv run pyright --warnings
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest tests
        language: system
        pass_filenames: false
        always_run: true

  # Frontend Checks (ESLint & Prettier)
  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend-eslint
        entry: npx --prefix frontend eslint --max-warnings=0
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
      - id: frontend-prettier
        name: frontend-prettier
        entry: npx --prefix frontend prettier --check
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|css|scss|html|json)$

  # 基本的なチェック (行末空白、YAML等)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: forbid-new-submodules
      - id: mixed-line-ending
        args: [--fix=lf]

  # スペルチェック
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        exclude: ^(frontend/package-lock\.json|uv\.lock)
